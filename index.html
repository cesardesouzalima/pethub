function EditableCombo({options=[],value='',onChange,placeholder='',label='',bg}){
 const [query,setQuery]=useState(value);
 const [open,setOpen]=useState(false);
 const filtered=query?options.filter(o=>o.toLowerCase().includes(query.toLowerCase())):options;
 return(
  <div style={{position:'relative',marginBottom:16}}>
   {label&&<div style={{fontSize:11,fontWeight:800,color:'#7A4030',textTransform:'uppercase',letterSpacing:1.1,marginBottom:9}}>{label}</div>}
   <div style={{background:bg||'#F0E6CE',borderRadius:13,padding:'13px 15px',display:'flex',alignItems:'center',gap:8}}>
    <input value={query}
     onChange={e=>{setQuery(e.target.value);onChange(e.target.value);setOpen(true);}}
     onFocus={()=>setOpen(true)}
     onBlur={()=>setTimeout(()=>setOpen(false),200)}
     placeholder={placeholder}
     style={{flex:1,fontSize:14,color:'#2D1610',fontWeight:500,background:'transparent',border:'none',outline:'none',fontFamily:'inherit'}}/>
    <span style={{color:'#C49A80',fontSize:12,flexShrink:0}}>▾</span>
   </div>
   {open&&filtered.length>0&&(
    <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,maxHeight:180,overflowY:'auto',background:'#fff',borderRadius:12,boxShadow:'0 8px 24px rgba(0,0,0,0.13)',zIndex:999}}>
     {filtered.map(opt=>(
      <div key={opt} onMouseDown={()=>{setQuery(opt);onChange(opt);setOpen(false);}}
       style={{padding:'12px 15px',fontSize:13,color:'#2D1610',fontWeight:500,borderBottom:'1px solid #F0E6CE',cursor:'pointer',background:'white'}}
       onMouseEnter={e=>e.target.style.background='#FAF6EE'}
       onMouseLeave={e=>e.target.style.background='white'}>
       {opt}
      </div>
     ))}
    </div>
   )}
  </div>
 );
}

function AuthScreen({mode,onSuccess,onBack}){
 const [email,setEmail]=useState('');
 const [pwd,setPwd]=useState('');
 const [name,setName]=useState('');
 const [phone,setPhone]=useState('');
 const [loading,setLoading]=useState(false);
 const [error,setError]=useState('');
 const isSignup=mode==='signup';

 async function handleSubmit(){
  if(!email||!pwd){setError('Preencha e-mail e senha.');return;}
  if(isSignup&&!name){setError('Informe seu nome.');return;}
  if(isSignup&&!phone){setError('Informe seu telefone.');return;}
  setLoading(true);setError('');
  try{
   if(isSignup){
    const {data,error:e}=await sb.auth.signUp({email,password:pwd,options:{data:{full_name:name}}});
    if(e)throw e;
    
    if(data.user){
     await sb.from('profiles').upsert({id:data.user.id,full_name:name,phone:phone},{onConflict:'id'});
    }
    onSuccess(data.user,'onboarding');
   }else{
    const {data,error:e}=await sb.auth.signInWithPassword({email,password:pwd});
    if(e)throw e;
    onSuccess(data.user,'home');
   }
  }catch(e){setError(e.message||'Erro. Tente novamente.');}
  setLoading(false);
 }

 return(<div style={{position:'absolute',inset:0,background:C.beigeLight,display:'flex',flexDirection:'column'}}>
  <StatusBar/>
  <div style={{background:`linear-gradient(160deg,${C.coral},${C.coralDark})`,padding:'28px 28px 36px'}}>
   <button onClick={onBack} style={{background:'rgba(255,255,255,0.18)',border:'none',color:C.white,borderRadius:11,padding:'7px 14px',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit',marginBottom:18}}>← Voltar</button>
   <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:700,color:C.white}}>{isSignup?'Criar Conta':'Entrar'}</div>
   <div style={{fontSize:13,color:'rgba(255,255,255,0.7)',marginTop:5}}>{isSignup?'Comece a cuidar do seu pet agora.':'Bem-vindo de volta! 🐾'}</div>
  </div>
  <div style={{padding:'28px 28px 40px',display:'flex',flexDirection:'column',gap:14}}>
   {isSignup&&<div><div style={{fontSize:11,fontWeight:800,color:C.mid,textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>Seu nome</div>
    <div style={{background:C.beige,borderRadius:13,padding:'13px 15px'}}><input value={name} onChange={e=>setName(e.target.value)} placeholder="Como você se chama?" style={{width:'100%',fontSize:14,color:C.dark,background:'transparent',border:'none',outline:'none',fontFamily:'inherit'}}/></div></div>}
   {isSignup&&<div><div style={{fontSize:11,fontWeight:800,color:C.mid,textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>Telefone / WhatsApp</div>
    <div style={{background:C.beige,borderRadius:13,padding:'13px 15px',display:'flex',alignItems:'center',gap:8}}>
     <span style={{fontSize:13,color:C.mid,fontWeight:700,flexShrink:0}}>+55</span>
     <div style={{width:1,height:16,background:C.mid,opacity:0.3}}/>
     <input type="tel" value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,'').slice(0,11))}
      placeholder="11 99999-0000"
      style={{flex:1,fontSize:14,color:C.dark,background:'transparent',border:'none',outline:'none',fontFamily:'inherit'}}/>
    </div>
   </div>}
   <div><div style={{fontSize:11,fontWeight:800,color:C.mid,textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>E-mail</div>
    <div style={{background:C.beige,borderRadius:13,padding:'13px 15px'}}><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com" style={{width:'100%',fontSize:14,color:C.dark,background:'transparent',border:'none',outline:'none',fontFamily:'inherit'}}/></div></div>
   <div><div style={{fontSize:11,fontWeight:800,color:C.mid,textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>Senha</div>
    <div style={{background:C.beige,borderRadius:13,padding:'13px 15px'}}><input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} placeholder={isSignup?'Mínimo 6 caracteres':'••••••••'} style={{width:'100%',fontSize:14,color:C.dark,background:'transparent',border:'none',outline:'none',fontFamily:'inherit'}}/></div></div>
   {error&&<div style={{background:'#FFF0F0',border:'1px solid #FFCCCC',borderRadius:11,padding:'10px 14px',fontSize:12,color:'#C00',fontWeight:600}}>{error}</div>}
   <button onClick={handleSubmit} disabled={loading} style={{padding:'16px',background:loading?C.beige:C.coral,color:loading?C.mid:C.white,borderRadius:17,fontSize:15,fontWeight:800,border:'none',cursor:loading?'default':'pointer',fontFamily:'inherit',marginTop:6}}>
    {loading?'Aguarde...':(isSignup?'Criar minha conta →':'Entrar →')}
   </button>
  </div>

function HomeScreen({onNavigate,activeNav,t}){
 const qas=[{id:"health",icon:"🏥",label:t.qaHealth,sub:t.qaHealthSub,bg:"#E8F5E9"},{id:"teleconsult",icon:"📱",label:"Consulta Remota",sub:"Veterinário online",bg:"#E3F2FD"},{id:"gps",icon:"📡",label:t.qaGPS,sub:t.qaGPSSub,bg:"#EDE7F6"},{id:"map",icon:"🗺️",label:t.qaMap,sub:t.qaMapSub,bg:"#E8EAF6"},{id:"petbot",icon:"🤖",label:t.qaPetbot,sub:t.qaPetbotSub,bg:"#F3E5F5"},{id:"weight",icon:"⚖️",label:"Peso",sub:"Acompanhar evolução",bg:"#E8F5E9"}];
 
 const [userName,setUserName]=useState('');
 const [pet,setPet]=useState({name:'',breed:'',ageStr:'',avatar:'🐾'});
 const [alerts,setAlerts]=useState([]);
 const [unreadCount,setUnreadCount]=useState(0);

 useEffect(()=>{
  async function loadAlerts(){
   try{
    const {data:{user}}=await sb.auth.getUser();
    if(!user)return;
    const {data:pets}=await sb.from('pets').select('id,name').eq('user_id',user.id).order('created_at',{ascending:false}).limit(1);
    if(!pets||!pets[0])return;
    const petId=pets[0].id;
    const petNm=pets[0].name||'Pet';
    const today=new Date();
    const al=[];
    
    const {data:vRows}=await sb.from('vaccines').select('name,next_dose_at').eq('pet_id',petId);
    (vRows||[]).forEach(v=>{
     if(!v.next_dose_at)return;
     const d=new Date(v.next_dose_at);
     const days=Math.ceil((d-today)/86400000);
     if(days<0)al.push({icon:"💉",title:`Vacina ${v.name}`,sub:`${petNm} · Vencida há ${Math.abs(days)} dias`,urgent:true,color:"red"});
     else if(days<=7)al.push({icon:"💉",title:`Vacina ${v.name}`,sub:`${petNm} · Vence em ${days} dias`,urgent:true,color:"red"});
     else if(days<=30)al.push({icon:"💉",title:`Vacina ${v.name}`,sub:`${petNm} · Vence em ${days} dias`,urgent:false,color:"yellow"});
    });
    
    const {data:pRows}=await sb.from('medications').select('name,end_date,dosage').eq('pet_id',petId).eq('active',true).in('name',['antipulgas','vermifugo','carrapaticida']);
    const PREV_ICONS={antipulgas:"🐛",vermifugo:"💊",carrapaticida:"🕷️"};
    const PREV_LABELS={antipulgas:"Antipulgas",vermifugo:"Vermífugo",carrapaticida:"Carrapaticida"};
    (pRows||[]).forEach(p=>{
     if(!p.end_date)return;
     const d=new Date(p.end_date);
     const days=Math.ceil((d-today)/86400000);
     const label=PREV_LABELS[p.name]||p.name;
     const icon=PREV_ICONS[p.name]||"💊";
     if(days<0)al.push({icon,title:label,sub:`${petNm} · Vencido há ${Math.abs(days)} dias`,urgent:true,color:"red"});
     else if(days<=7)al.push({icon,title:label,sub:`${petNm} · Aplicar em ${days} dias`,urgent:true,color:"yellow"});
    });
    
    const {data:cRows}=await sb.from('medical_records').select('consult_date').eq('pet_id',petId).neq('symptoms','__surgery__').order('consult_date',{ascending:false}).limit(1);
    if(!cRows||!cRows.length){
     al.push({icon:"🩺",title:"Consulta de rotina",sub:`${petNm} · Nenhuma consulta registrada`,urgent:false,color:"blue"});
    }else{
     const months=(today-new Date(cRows[0].consult_date))/(30*86400000);
     if(months>12)al.push({icon:"🩺",title:"Check-up atrasado",sub:`${petNm} · Última consulta há ${Math.round(months)} meses`,urgent:false,color:"yellow"});
    }
    
    const {data:mRows}=await sb.from('medications').select('name,end_date').eq('pet_id',petId).eq('active',true).not('name','in','(antipulgas,vermifugo,carrapaticida)');
    (mRows||[]).forEach(m=>{
     if(!m.end_date)return;
     const d=new Date(m.end_date);
     const days=Math.ceil((d-today)/86400000);
     if(days>=0&&days<=3)al.push({icon:"💊",title:`Medicamento: ${m.name}`,sub:`${petNm} · Acaba em ${days} dias`,urgent:true,color:"yellow"});
    });
    setAlerts(al.slice(0,5));
    
    try{
     const {data:{user}}=await sb.auth.getUser();
     if(user&&al.length){
      const petSnap=await sb.from('pets').select('id').eq('user_id',user.id).order('created_at',{ascending:false}).limit(1);
      const petId=petSnap.data?.[0]?.id||null;
      const upserts=al.map((a,idx)=>({
       user_id:user.id,
       pet_id:petId,

 const [healthScore,setHealthScore]=useState(null);
 const [prev,setPrev]=useState(null);
 const [showPrevForm,setShowPrevForm]=useState(false);
 const [prevType,setPrevType]=useState("antipulgas");
 const [prevProduct,setPrevProduct]=useState("");
 const [prevLastDate,setPrevLastDate]=useState(new Date().toISOString().split("T")[0]);
 const [prevSaving,setPrevSaving]=useState(false);

 const PREV_TYPES={
  "antipulgas":{label:"🐛 Antipulgas",days:30,icon:"🐛"},
  "vermifugo":  {label:"💊 Vermífugo", days:90,icon:"💊"},
  "carrapaticida":{label:"🕷️ Carrapaticida",days:30,icon:"🕷️"}
 };

 function calcScore(vaccArr,consArr,prevArr,docsArr,hasPeso){
  let s=0;
  const today=new Date();
  
  if(vaccArr&&vaccArr.length){const ok=vaccArr.filter(v=>!v.w).length;s+=Math.round((ok/vaccArr.length)*35);}
  else if(vaccArr!==null)s+=0;
  
  if(consArr&&consArr.length){
   const last=new Date(consArr[0].consult_date);
   const months=(today-last)/(30*86400000);
   if(months<6)s+=20;else if(months<12)s+=10;
  }
  
  if(prevArr&&prevArr.length){
   const allOk=prevArr.every(p=>{
    if(!p.end_date)return true;
    return new Date(p.end_date)>today;
   });
   if(allOk)s+=20;else s+=5;
  }else if(prevArr!==null)s+=10;
  
  s+=15; 
  
  if(hasPeso)s+=5;
  
  if(docsArr&&docsArr.length)s+=5;
  return Math.min(100,s);
 }

 useEffect(()=>{
  async function loadAll(){
   try{
    const {data:{user}}=await sb.auth.getUser();
    if(!user){setVacc([]);setPrev([]);return;}
    const {data:pets}=await sb.from('pets').select('id,name,weight_kg,avatar_url').eq('user_id',user.id).order('created_at',{ascending:false}).limit(1);
    if(!pets||!pets.length){setVacc([]);setPrev([]);return;}
    const pet=pets[0];
    setPetName(pet.name||'');
    setPetAvatar(pet.avatar_url||'🐾');
    const today=new Date();

    
    const {data:vRows}=await sb.from('vaccines').select('*').eq('pet_id',pet.id).order('next_dose_at',{ascending:true});
    const vaccArr=(vRows||[]).map(r=>{
     const next=r.next_dose_at?new Date(r.next_dose_at):null;
     const warn=next&&(next-today)<14*86400000;
     return{n:r.name,w:!!warn,d:next?next.toLocaleDateString('pt-BR'):'—',id:r.id};
    });
    setVacc(vaccArr.length?vaccArr:[]);

    
    const {data:pRows}=await sb.from('medications').select('*').eq('pet_id',pet.id).eq('active',true).in('name',['antipulgas','vermifugo','carrapaticida']).order('end_date',{ascending:true});
    const prevArr=(pRows||[]).map(r=>{
     const endDate=r.end_date?new Date(r.end_date):null;
     const daysLeft=endDate?Math.ceil((endDate-today)/86400000):null;
     let status='ok';
     if(daysLeft!==null){if(daysLeft<0)status='vencido';else if(daysLeft<=7)status='alerta';}
     return{...r,daysLeft,status,endDateStr:endDate?endDate.toLocaleDateString('pt-BR'):'—'};
    });
    setPrev(prevArr);

    
    const {data:cRows}=await sb.from('medical_records').select('consult_date').eq('pet_id',pet.id).neq('symptoms','__surgery__').order('consult_date',{ascending:false}).limit(1);
    const {data:dRows}=await sb.from('documents').select('id').eq('pet_id',pet.id).limit(1);
    setHealthScore(calcScore(vaccArr,cRows||[],prevArr,dRows||[],!!pet.weight_kg));
   }catch(e){console.warn('loadAll:',e);setVacc([]);setPrev([]);}
  }
  loadAll();
 },[]);

 async function handleDocUpload(){
  if(!docFile)return;
  setDocUploading(true);
  try{
   const {data:{user}}=await sb.auth.getUser();
   if(!user)return;
   const {data:pets}=await sb.from("pets").select("id").eq("user_id",user.id).order("created_at",{ascending:false}).limit(1);

 }

function ProfileScreen({onNavigate,activeNav,t,lang,setLang}){

 useEffect(()=>{

    const {data:pets}=await sb.from("pets").select("*").eq("user_id",user.id).order("created_at",{ascending:false}).limit(1);

    const petId=pets&&pets[0]?pets[0].id:null;

     const {data:rows}=await sb.from("medical_records").select("*")

function NotificationsScreen({onNavigate,activeNav,t}){
 const [notifs,setNotifs]=useState(null);
 const [marking,setMarking]=useState(null);

 useEffect(()=>{
  loadNotifs();
 },[]);

 async function loadNotifs(){
  try{
   const {data:{user}}=await sb.auth.getUser();
   if(!user){setNotifs([]);return;}
   const {data:rows}=await sb.from('notifications')
    .select('*').eq('user_id',user.id)
    .order('urgent',{ascending:false})
    .order('created_at',{ascending:false});
   setNotifs(rows||[]);
  }catch(e){console.warn("loadNotifs:",e);setNotifs([]);}
 }

 async function markRead(id){
  setMarking(id);
  try{
   await sb.from('notifications').update({is_read:true,updated_at:new Date().toISOString()}).eq('id',id);
   setNotifs(prev=>prev.map(n=>n.id===id?{...n,is_read:true}:n));
  }catch(e){console.warn("markRead:",e);}
  setMarking(null);
 }

 async function markAllRead(){
  setMarking('all');
  try{
   const {data:{user}}=await sb.auth.getUser();
   if(user){
    await sb.from('notifications').update({is_read:true,updated_at:new Date().toISOString()}).eq('user_id',user.id).eq('is_read',false);
    setNotifs(prev=>prev.map(n=>({...n,is_read:true})));
   }
  }catch(e){console.warn("markAllRead:",e);}
  setMarking(null);
 }

 const unread=(notifs||[]).filter(n=>!n.is_read);
 const urgent=(notifs||[]).filter(n=>n.urgent&&!n.is_read);
 const nonUrgent=(notifs||[]).filter(n=>!n.urgent&&!n.is_read);
 const read=(notifs||[]).filter(n=>n.is_read);

 const borderColor=n=>n.color==="red"?C.coral:n.color==="yellow"?"#E65100":n.color==="green"?C.green:C.light;
 const bgColor=n=>n.color==="red"?`${C.coral}15`:n.color==="yellow"?"#FFF3E0":n.color==="green"?`${C.green}15`:C.beige;

 function NotifCard({n}){
  return(
   <div style={{background:C.white,borderRadius:15,padding:"13px 15px",display:"flex",gap:11,boxShadow:"0 2px 8px rgba(0,0,0,0.05)",borderLeft:n.is_read?"4px solid transparent":`4px solid ${borderColor(n)}`,opacity:n.is_read?0.6:1}}>
    <div style={{width:40,height:40,borderRadius:11,background:n.is_read?C.beige:bgColor(n),display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{n.icon||"🔔"}</div>
    <div style={{flex:1,minWidth:0}}>
     <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:3,gap:8}}>
      <div style={{fontSize:13,fontWeight:n.is_read?600:800,color:n.is_read?C.light:C.dark,lineHeight:1.3,flex:1}}>{n.title}</div>
      {!n.is_read&&<div style={{width:8,height:8,borderRadius:"50%",background:borderColor(n),flexShrink:0,marginTop:4}}/>}
     </div>
     {n.body&&<div style={{fontSize:12,color:C.mid,fontWeight:500,lineHeight:1.4,marginBottom:6}}>{n.body}</div>}
     <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div style={{fontSize:10,color:C.light,fontWeight:600}}>{new Date(n.created_at).toLocaleDateString("pt-BR")}</div>
      {!n.is_read&&(
       <button onClick={()=>markRead(n.id)} disabled={marking===n.id}
        style={{background:"none",border:`1px solid ${C.coral}`,color:C.coral,borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",opacity:marking===n.id?0.5:1}}>
        {marking===n.id?"...":"✓ Lido"}
       </button>
      )}
     </div>
    </div>
   </div>
  );
 }

 return(<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column"}}>
  <div style={{flex:1,overflowY:"auto",background:C.beigeLight}}>
   <StatusBar/>
   <div style={{padding:"0 24px 0"}}><SubHeader title={t.notifTitle} onBack={()=>onNavigate("home")}/></div>

   {/* Header com contagem e botão marcar todos */}
   <div style={{padding:"0 24px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
    <div style={{fontSize:13,color:C.mid,fontWeight:600}}>
     {notifs===null?"Carregando...":unread.length>0?`${unread.length} não lida${unread.length>1?"s":""}`:
     "Tudo lido ✓"}
    </div>
    {unread.length>0&&<button onClick={markAllRead} disabled={marking==="all"}
     style={{background:`${C.coral}15`,border:"none",color:C.coral,borderRadius:10,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",opacity:marking==="all"?0.5:1}}>
     {marking==="all"?"Marcando...":"✓ Marcar todas como lidas"}
    </button>}
   </div>

   <div style={{padding:"0 24px 100px",display:"flex",flexDirection:"column",gap:20}}>
    {notifs===null&&(
     <div style={{display:"flex",justifyContent:"center",padding:"40px"}}>
      <div style={{width:28,height:28,border:`3px solid ${C.beige}`,borderTop:`3px solid ${C.coral}`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
     </div>
    )}

    {notifs!==null&&notifs.length===0&&(
     <div style={{textAlign:"center",padding:"48px 16px"}}>
      <div style={{fontSize:48,marginBottom:12}}>✅</div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:C.dark,marginBottom:6}}>Sem notificações</div>
      <div style={{fontSize:13,color:C.light}}>Quando houver alertas de saúde, eles aparecerão aqui.</div>
     </div>
    )}

    {urgent.length>0&&(
     <div>
      <div style={{fontSize:11,fontWeight:800,color:C.coral,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>🔴 Urgente — {urgent.length} alerta{urgent.length>1?"s":""}</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>{urgent.map(n=><NotifCard key={n.id} n={n}/>)}</div>
     </div>
    )}

    {nonUrgent.length>0&&(
     <div>
      <div style={{fontSize:11,fontWeight:800,color:"#E65100",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>⚠️ Atenção — {nonUrgent.length} item{nonUrgent.length>1?"s":""}</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>{nonUrgent.map(n=><NotifCard key={n.id} n={n}/>)}</div>
     </div>
    )}

    {read.length>0&&(
     <div>
      <div style={{fontSize:11,fontWeight:800,color:C.light,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>✓ Lidas — {read.length}</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>{read.map(n=><NotifCard key={n.id} n={n}/>)}</div>
     </div>
    )}
   </div>
  </div>
  <BottomNav active={activeNav} onTab={onNavigate} t={t}/>
 </div>);}

 return(<div style={{position:"absolute",inset:0,background:C.beigeLight,overflowY:"auto"}}><StatusBar/><div style={{padding:"0 24px 48px"}}><SubHeader title={t.avTitle} onBack={()=>onNavigate("health")}/><div style={{background:`${C.coral}10`,borderRadius:14,padding:"12px 15px",marginBottom:22,display:"flex",gap:9,alignItems:"center"}}><span style={{fontSize:19}}>🐶</span><div><div style={{fontSize:13,fontWeight:700,color:C.dark}}>Thor</div><div style={{fontSize:11,color:C.light,fontWeight:500}}>Golden Retriever · 3 anos</div></div></div>
  <EditableCombo label="VACINA" options={vaccines} value={vName} onChange={setVName} placeholder="Digite ou selecione a vacina..."/>
  {FText("APLICAÇÃO",date,setDate,"DD/MM/AAAA")}
  <EditableCombo label="CLÍNICA / HOSPITAL" options={clinics} value={clinic} onChange={setClinic} placeholder="Digite ou selecione a clínica..."/>
  {FText(t.fieldVet,vet,setVet,"Nome do veterinário")}
  {FText(t.fieldNext,next,setNext,"DD/MM/AAAA")}
  <div style={{marginBottom:22}}><div style={{fontSize:11,fontWeight:800,color:C.mid,textTransform:"uppercase",letterSpacing:1.1,marginBottom:9}}>{t.fieldProof}</div><button style={{width:"100%",padding:"14px",background:C.white,borderRadius:13,border:`2px dashed ${C.beige}`,fontSize:13,fontWeight:700,color:C.light,cursor:"pointer",fontFamily:"inherit"}}>{t.attachBtn}</button></div>
  <button onClick={async()=>{
   try{
    const {data:{user}}=await sb.auth.getUser();
    if(user){
     const {data:pets}=await sb.from('pets').select('id').eq('user_id',user.id).limit(1);
     const petId=pets&&pets[0]?pets[0].id:null;
     if(petId){
      const appliedParts=(date||'10/06/2026').split('/');
      const appliedISO=appliedParts.length===3?`${appliedParts[2]}-${appliedParts[1]}-${appliedParts[0]}`:'2026-06-10';
      let nextISO=null;
      if(next){const np=next.split('/');if(np.length===3)nextISO=`${np[2]}-${np[1]}-${np[0]}`;}
      await sb.from('vaccines').insert({
       pet_id:petId, user_id:user.id,
       name:vName||'V10 Múltipla',
       applied_at:appliedISO,
       clinic:clinic||null, vet_name:vet||null,
       next_dose_at:nextISO||null
      });
     }
    }
   }catch(e){console.warn('saveVaccine:',e);}
   setSaved(true);
  }} style={{width:"100%",padding:"16px",background:C.coral,color:C.white,borderRadius:17,fontSize:15,fontWeight:800,border:"none",cursor:"pointer",fontFamily:"inherit"}}>Salvar no Prontuário</button>
 </div></div>);}

function WeightScreen({onNavigate}){
 const [pet,setPet]=useState({name:"",breed:"",avatar:"🐾"});
 const [records,setRecords]=useState(null);
 const [showForm,setShowForm]=useState(false);
 const [newWeight,setNewWeight]=useState("");
 const [newDate,setNewDate]=useState(new Date().toISOString().split("T")[0]);
 const [newNotes,setNewNotes]=useState("");
 const [saving,setSaving]=useState(false);

 useEffect(()=>{loadData();},[]);

 async function loadData(){
  try{
   const {data:{user}}=await sb.auth.getUser();
   if(!user){setRecords([]);return;}
   const {data:pets}=await sb.from("pets").select("id,name,breed,avatar_url").eq("user_id",user.id).order("created_at",{ascending:false}).limit(1);
   if(!pets||!pets[0]){setRecords([]);return;}
   const p=pets[0];
   setPet({name:p.name||"",breed:p.breed||"",avatar:p.avatar_url||"🐾"});
   const {data:rows}=await sb.from("weight_records").select("*").eq("pet_id",p.id).order("measured_at",{ascending:true});
   setRecords(rows||[]);
  }catch(e){console.warn("WeightScreen:",e);setRecords([]);}
 }

 async function saveWeight(){
  if(!newWeight||isNaN(Number(newWeight)))return;
  setSaving(true);
  try{
   const {data:{user}}=await sb.auth.getUser();
   const {data:pets}=await sb.from("pets").select("id").eq("user_id",user.id).order("created_at",{ascending:false}).limit(1);
   if(pets&&pets[0]){
    const {data:ins}=await sb.from("weight_records").insert({
     pet_id:pets[0].id,user_id:user.id,
     weight_kg:Number(newWeight),
     measured_at:newDate,
     notes:newNotes||null
    }).select().single();
    if(ins){
     setRecords(prev=>[...(prev||[]),ins].sort((a,b)=>a.measured_at>b.measured_at?1:-1));
     
     await sb.from("pets").update({weight_kg:Number(newWeight)}).eq("id",pets[0].id);
    }
    setNewWeight("");setNewNotes("");setShowForm(false);
   }
  }catch(e){console.warn("saveWeight:",e);}
  setSaving(false);
 }

 
 function WeightChart(){
  if(!records||records.length===0)return null;
  const ideal=BREED_WEIGHT[pet.breed]||{min:5,max:30};
  const ws=records.map(r=>Number(r.weight_kg));
  const allW=[...ws,ideal.min,ideal.max];
  const minW=Math.max(0,Math.min(...allW)-3);
  const maxW=Math.max(...allW)+3;
  const W=320,H=160,PL=40,PR=20,PT=16,PB=36;
  const cW=W-PL-PR,cH=H-PT-PB;
  const dates=records.map(r=>new Date(r.measured_at).getTime());
  const minD=dates.length>1?Math.min(...dates):dates[0]-86400000*30;
  const maxD=dates.length>1?Math.max(...dates):dates[0]+86400000*30;
  const xS=d=>PL+((d-minD)/(maxD-minD||1))*cW;
  const yS=w=>PT+cH-((w-minW)/(maxW-minW))*cH;
  const yIdMin=yS(ideal.min),yIdMax=yS(ideal.max);
  const linePts=records.map(r=>`${xS(new Date(r.measured_at).getTime())},${yS(Number(r.weight_kg))}`).join(" ");
  const yticks=[minW,minW+(maxW-minW)/2,maxW].map(v=>Math.round(v));
  const xticks=records.length<=4?records:records.filter((_,i)=>i===0||i===records.length-1||i%Math.ceil(records.length/3)===0);
  return(
   <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto"}}>
    {/* Zona ideal */}
    <rect x={PL} y={yIdMax} width={cW} height={yIdMin-yIdMax} fill="#A8E6CF" opacity="0.3"/>
    <line x1={PL} y1={yIdMin} x2={PL+cW} y2={yIdMin} stroke="#A8E6CF" strokeWidth="1.5" strokeDasharray="4,3"/>
    <line x1={PL} y1={yIdMax} x2={PL+cW} y2={yIdMax} stroke="#A8E6CF" strokeWidth="1.5" strokeDasharray="4,3"/>
    {/* Eixo Y */}
    {yticks.map(v=>(
     <g key={v}>
      <line x1={PL-3} y1={yS(v)} x2={PL+cW} y2={yS(v)} stroke="#E0D8CC" strokeWidth="0.8"/>
      <text x={PL-6} y={yS(v)+4} fontSize="9" fill="#9B8B7A" textAnchor="end">{v}kg</text>
     </g>
    ))}
    {/* Eixo X */}
    {xticks.map(r=>(
     <text key={r.id} x={xS(new Date(r.measured_at).getTime())} y={H-6} fontSize="8" fill="#9B8B7A" textAnchor="middle">
      {new Date(r.measured_at+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"})}
     </text>
    ))}
    {/* Linha de peso */}
    {records.length>1&&<polyline points={linePts} fill="none" stroke="#C1714A" strokeWidth="2.5" strokeLinejoin="round"/>}
    {/* Dots */}
    {records.map(r=>{
     const cx=xS(new Date(r.measured_at).getTime());
     const cy=yS(Number(r.weight_kg));
     const w=Number(r.weight_kg);
     const ok=w>=ideal.min&&w<=ideal.max;
     return(<g key={r.id}>
      <circle cx={cx} cy={cy} r={5} fill={ok?"#A8E6CF":w<ideal.min?"#FFD580":"#FF8A80"} stroke="white" strokeWidth="2"/>
      <text x={cx} y={cy-9} fontSize="8.5" fill="#5C4A3A" textAnchor="middle" fontWeight="700">{w}kg</text>
     </g>);
    })}
    {/* Label zona ideal */}
    <text x={PL+cW-4} y={yIdMin-5} fontSize="8" fill="#4CAF50" textAnchor="end">ideal</text>
   </svg>
  );
 }

 const ideal=BREED_WEIGHT[pet.breed];
 const lastW=records&&records.length>0?Number(records[records.length-1].weight_kg):null;
 const statusW=lastW&&ideal?(lastW<ideal.min?"abaixo":lastW>ideal.max?"acima":"ideal"):null;

 return(<div style={{position:"absolute",inset:0,background:C.beigeLight,display:"flex",flexDirection:"column"}}>
  <div style={{flex:1,overflowY:"auto"}}>
   <div style={{background:`linear-gradient(130deg,${C.coral} 0%,${C.coralDark} 100%)`,padding:"0 24px 22px",position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",right:-35,top:-35,width:140,height:140,borderRadius:"50%",background:"rgba(255,255,255,0.07)"}}/>
    <StatusBar light/>
    <button onClick={()=>onNavigate("health")} style={{background:"rgba(255,255,255,0.14)",border:"none",display:"flex",alignItems:"center",gap:7,color:C.white,marginBottom:14,fontSize:13,fontWeight:600,borderRadius:10,padding:"6px 12px",cursor:"pointer",fontFamily:"inherit"}}><ArrowLeft size={15}/>Voltar</button>
    <div style={{display:"flex",alignItems:"center",gap:12}}>
     <div style={{fontSize:28}}>{pet.avatar}</div>
     <div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:C.white}}>Peso de {pet.name||"..."}</div>
      <div style={{color:"rgba(255,255,255,0.7)",fontSize:12,fontWeight:500}}>{pet.breed||"Evolução e Controle"}</div>
     </div>
    </div>
    {lastW&&<div style={{marginTop:14,display:"flex",gap:10}}>
     <div style={{background:"rgba(255,255,255,0.15)",borderRadius:12,padding:"8px 14px",textAlign:"center"}}>
      <div style={{fontSize:20,fontWeight:800,color:C.white}}>{lastW}kg</div>
      <div style={{fontSize:10,color:"rgba(255,255,255,0.7)",fontWeight:600}}>Atual</div>
     </div>
     {ideal&&<div style={{background:"rgba(255,255,255,0.15)",borderRadius:12,padding:"8px 14px",textAlign:"center"}}>
      <div style={{fontSize:14,fontWeight:700,color:statusW==="ideal"?"#A8E6CF":statusW==="acima"?"#FF8A80":"#FFD580"}}>{statusW==="ideal"?"✅ Ideal":statusW==="acima"?"⚠️ Acima":statusW==="abaixo"?"⚠️ Abaixo":"—"}</div>
      <div style={{fontSize:10,color:"rgba(255,255,255,0.7)",fontWeight:600}}>Ideal: {ideal.min}–{ideal.max}kg</div>
     </div>}
    </div>}
   </div>

   <div style={{padding:"18px 20px 100px"}}>
    {/* Gráfico */}
    <div style={{background:C.white,borderRadius:18,padding:"16px",marginBottom:14,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
     <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:C.dark}}>📊 Evolução do Peso</div>
      {ideal&&<div style={{fontSize:11,color:C.green,fontWeight:700,display:"flex",alignItems:"center",gap:4}}><div style={{width:10,height:10,borderRadius:2,background:`${C.green}40`,border:`1.5px dashed ${C.green}`}}/> Zona ideal</div>}
     </div>
     {records===null&&<div style={{display:"flex",justifyContent:"center",padding:"24px"}}><div style={{width:24,height:24,border:`3px solid ${C.beige}`,borderTop:`3px solid ${C.coral}`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/></div>}
     {records!==null&&records.length===0&&<div style={{textAlign:"center",padding:"24px",color:C.light,fontSize:13}}>Nenhuma pesagem registrada ainda.</div>}
     {records!==null&&records.length>0&&<WeightChart/>}
    </div>

    {/* Histórico */}
    {records!==null&&records.length>0&&(
     <div style={{background:C.white,borderRadius:18,padding:"15px",marginBottom:14,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
      <div style={{fontSize:11,fontWeight:800,color:C.mid,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>HISTÓRICO DE PESAGENS</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
       {[...(records||[])].reverse().slice(0,8).map((r,i)=>{
        const w=Number(r.weight_kg);
        const ok=ideal&&w>=ideal.min&&w<=ideal.max;
        const above=ideal&&w>ideal.max;
        return(<div key={r.id} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:i<Math.min(7,records.length-1)?`1px solid ${C.beige}`:"none"}}>
         <div style={{width:36,height:36,borderRadius:10,background:ok?`${C.green}15`:above?`${C.coral}15`:"#FFF3E0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>⚖️</div>
         <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:700,color:C.dark}}>{w} kg</div>
          {r.notes&&<div style={{fontSize:11,color:C.light,fontWeight:500}}>{r.notes}</div>}
         </div>
         <div style={{textAlign:"right"}}>
          <div style={{fontSize:12,color:C.mid,fontWeight:600}}>{new Date(r.measured_at+"T12:00:00").toLocaleDateString("pt-BR")}</div>
          <div style={{fontSize:10,fontWeight:700,color:ok?C.green:above?C.coral:"#E65100"}}>{ok?"✅ Ideal":above?"⚠️ Acima":"⚠️ Abaixo"}</div>
         </div>
        </div>);
       })}
      </div>
     </div>
    )}

    {/* Formulário de registro */}
    {showForm?(
     <div style={{background:C.white,borderRadius:18,padding:"16px",marginBottom:14,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
      <div style={{fontSize:13,fontWeight:800,color:C.dark,marginBottom:14}}>⚖️ Registrar Pesagem</div>
      <div style={{marginBottom:12}}>
       <div style={{fontSize:11,fontWeight:700,color:C.mid,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>PESO (KG)</div>
       <div style={{background:C.beige,borderRadius:12,padding:"13px 15px",display:"flex",alignItems:"center",gap:8}}>
        <input type="number" step="0.1" value={newWeight} onChange={e=>setNewWeight(e.target.value)} placeholder="Ex: 28.5"
         style={{flex:1,fontSize:18,fontWeight:700,color:C.dark,background:"transparent",border:"none",outline:"none",fontFamily:"inherit"}}/>
        <span style={{fontSize:13,color:C.mid,fontWeight:600}}>kg</span>
       </div>
       {newWeight&&ideal&&(
        <div style={{fontSize:11,fontWeight:700,marginTop:6,color:Number(newWeight)>=ideal.min&&Number(newWeight)<=ideal.max?C.green:C.coral}}>
         {Number(newWeight)>=ideal.min&&Number(newWeight)<=ideal.max?"✅ Dentro do peso ideal para a raça":`⚠️ Peso ideal: ${ideal.min}–${ideal.max}kg`}
        </div>
       )}
      </div>
      <div style={{marginBottom:12}}>
       <div style={{fontSize:11,fontWeight:700,color:C.mid,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>DATA DA PESAGEM</div>
       <div style={{background:C.beige,borderRadius:12,padding:"11px 14px"}}>
        <input type="date" value={newDate} onChange={e=>setNewDate(e.target.value)}
         style={{width:"100%",fontSize:13,color:C.dark,background:"transparent",border:"none",outline:"none",fontFamily:"inherit"}}/>
       </div>
      </div>
      <div style={{marginBottom:14}}>
       <div style={{fontSize:11,fontWeight:700,color:C.mid,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>OBSERVAÇÃO</div>
       <div style={{background:C.beige,borderRadius:12,padding:"11px 14px"}}>
        <input value={newNotes} onChange={e=>setNewNotes(e.target.value)} placeholder="Ex: Após consulta, em jejum..."
         style={{width:"100%",fontSize:13,color:C.dark,background:"transparent",border:"none",outline:"none",fontFamily:"inherit"}}/>
       </div>
      </div>
      <div style={{display:"flex",gap:8}}>
       <button onClick={()=>setShowForm(false)} style={{flex:1,padding:"12px",background:C.beige,color:C.mid,borderRadius:13,fontSize:13,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"inherit"}}>Cancelar</button>
       <button onClick={saveWeight} disabled={saving||!newWeight}
        style={{flex:2,padding:"12px",background:saving||!newWeight?C.beige:C.coral,color:saving||!newWeight?C.mid:C.white,borderRadius:13,fontSize:13,fontWeight:800,border:"none",cursor:"pointer",fontFamily:"inherit"}}>
        {saving?"Salvando...":"✅ Registrar Peso"}
       </button>
      </div>
     </div>
    ):(
     <button onClick={()=>setShowForm(true)}
      style={{width:"100%",padding:"16px",background:C.coral,color:C.white,borderRadius:17,fontSize:15,fontWeight:800,border:"none",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
      <Plus size={16}/>Registrar Pesagem
     </button>
    )}
   </div>
  </div>
 </div>);}

function TeleconsultScreen({onNavigate}){
 const [step,setStep]=useState(0); 
 const [selVet,setSelVet]=useState(null);
 const [symptoms,setSymptoms]=useState("");
 const [timer,setTimer]=useState(0);
 const [petName,setPetName]=useState("");

 useEffect(()=>{
  sb.auth.getUser().then(({data:{user}})=>{
   if(!user)return;
   sb.from("pets").select("name").eq("user_id",user.id).order("created_at",{ascending:false}).limit(1)
    .then(({data})=>{if(data&&data[0])setPetName(data[0].name||"");});
  });
 },[]);

 useEffect(()=>{
  if(step!==2)return;
  const t=setTimeout(()=>setStep(3),3000);
  return()=>clearTimeout(t);
 },[step]);

 useEffect(()=>{
  if(step!==3)return;
  const t=setInterval(()=>setTimer(s=>s+1),1000);
  return()=>clearInterval(t);
 },[step]);

 const vets=[
  {id:1,name:"Dr. Carlos Mendes",spec:"Clínico Geral",rating:4.9,reviews:127,online:true,wait:"Disponível agora",emoji:"👨‍⚕️",price:"R$ 80"},
  {id:2,name:"Dra. Ana Lima",spec:"Dermatologista Pet",rating:4.8,reviews:89,online:true,wait:"≈ 5 min",emoji:"👩‍⚕️",price:"R$ 90"},
  {id:3,name:"Dr. Rodrigo Pires",spec:"Ortopedista Pet",rating:4.7,reviews:56,online:false,wait:"≈ 20 min",emoji:"👨‍⚕️",price:"R$ 110"},
 ];

 const fmtTime=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

 if(step===3)return(
  <div style={{position:"absolute",inset:0,background:"#1a1a2e",display:"flex",flexDirection:"column"}}>
   <StatusBar light/>
   {/* Simulação de vídeo */}
   <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:"20px"}}>
    <div style={{width:160,height:160,borderRadius:"50%",background:`linear-gradient(135deg,${C.coral},${C.coralDark})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:64,boxShadow:"0 0 0 4px rgba(255,255,255,0.1),0 0 0 8px rgba(255,255,255,0.05)"}}>
     {selVet?.emoji||"👨‍⚕️"}
    </div>
    <div style={{textAlign:"center"}}>
     <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"white"}}>{selVet?.name}</div>
     <div style={{fontSize:12,color:"rgba(255,255,255,0.6)",marginTop:4}}>{selVet?.spec}</div>
     <div style={{fontSize:18,fontWeight:800,color:C.green,marginTop:8}}>{fmtTime(timer)}</div>
    </div>
    <div style={{background:"rgba(255,255,255,0.08)",borderRadius:16,padding:"12px 20px",width:"100%",maxWidth:300}}>
     <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Sintomas relatados</div>
     <div style={{fontSize:13,color:"rgba(255,255,255,0.85)",lineHeight:1.5}}>{symptoms||"Consulta geral"}</div>
    </div>
   </div>
   {/* Controles */}
   <div style={{padding:"20px 32px 44px",display:"flex",gap:20,justifyContent:"center"}}>
    {[["🔇","Mudo"],["📷","Câmera"],["💬","Chat"]].map(([ic,lb])=>(
     <div key={lb} style={{textAlign:"center"}}>
      <div style={{width:52,height:52,borderRadius:"50%",background:"rgba(255,255,255,0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,cursor:"pointer",marginBottom:5}}>{ic}</div>
      <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",fontWeight:600}}>{lb}</div>
     </div>
    ))}
    <div style={{textAlign:"center"}}>
     <div onClick={()=>onNavigate("home")} style={{width:52,height:52,borderRadius:"50%",background:"#D32F2F",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,cursor:"pointer",marginBottom:5}}>📵</div>
     <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",fontWeight:600}}>Encerrar</div>
    </div>
   </div>
  </div>
 );

 if(step===2)return(
  <div style={{position:"absolute",inset:0,background:C.beigeLight,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20,padding:"40px"}}>
   <div style={{fontSize:64}}>{selVet?.emoji}</div>
   <div style={{textAlign:"center"}}>
    <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:C.dark}}>Conectando com {selVet?.name}...</div>
    <div style={{fontSize:13,color:C.light,marginTop:6}}>Aguarde enquanto o veterinário entra na sala</div>
   </div>
   <div style={{display:"flex",gap:8}}>
    {[0,1,2].map(i=><div key={i} style={{width:10,height:10,borderRadius:"50%",background:C.coral,animation:`pulse 1.2s ${i*0.4}s infinite`}}/>)}
   </div>
   <style>{`@keyframes pulse{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}`}</style>

function ConsultPrepScreen({onNavigate}){
 const [data,setData]=useState(null);
 const [copied,setCopied]=useState(false);

 useEffect(()=>{
  async function load(){
   try{
    const {data:{user}}=await sb.auth.getUser();
    if(!user){setData({});return;}
    const {data:pets}=await sb.from("pets").select("*").eq("user_id",user.id).order("created_at",{ascending:false}).limit(1);
    if(!pets||!pets[0]){setData({});return;}
    const p=pets[0];
    const yrs=p.birth_date?Math.floor((Date.now()-new Date(p.birth_date))/(365.25*86400000)):null;
    
    const {data:alg}=await sb.from("allergies").select("allergen,severity").eq("pet_id",p.id).eq("active",true);
    
    const {data:meds}=await sb.from("medications").select("name,dosage,frequency_hours,end_date").eq("pet_id",p.id).eq("active",true);
    
    const today=new Date();
    const {data:vacc}=await sb.from("vaccines").select("name,next_dose_at").eq("pet_id",p.id);
    const vaccAlert=(vacc||[]).filter(v=>v.next_dose_at&&(new Date(v.next_dose_at)-today)<30*86400000);
    
    const {data:cons}=await sb.from("medical_records").select("*").eq("pet_id",p.id).neq("symptoms","__surgery__").order("consult_date",{ascending:false}).limit(1);
    
    const {data:wRec}=await sb.from("weight_records").select("weight_kg,measured_at").eq("pet_id",p.id).order("measured_at",{ascending:false}).limit(1);
    
    const {data:surg}=await sb.from("medical_records").select("diagnosis,consult_date").eq("pet_id",p.id).eq("symptoms","__surgery__");
    setData({
     pet:{name:p.name,breed:p.breed,age:yrs,sex:p.sex,castrado:p.notes,avatar:p.avatar_url,weight:wRec?.[0]?.weight_kg},
     allergies:alg||[],
     medications:(meds||[]).filter(m=>!["antipulgas","vermifugo","carrapaticida"].includes(m.name)),
     preventivos:(meds||[]).filter(m=>["antipulgas","vermifugo","carrapaticida"].includes(m.name)),
     vaccAlert,
     lastConsult:cons?.[0]||null,
     surgeries:surg||[]
    });
   }catch(e){console.warn("ConsultPrep:",e);setData({});}
  }
  load();
 },[]);

 function buildText(){
  if(!data||!data.pet)return"";
  const d=data;

   `🐾 RESUMO DO PET — ${d.pet.name||"Pet"}`,

   "",
   `🚨 ALERGIAS (${d.allergies.length}):`,
   ...(d.allergies.length?d.allergies.map(a=>`  • ${a.allergen} — ${a.severity}`):["  Nenhuma registrada"]),
   "",
   `💊 MEDICAMENTOS ATIVOS (${d.medications.length}):`,
   ...(d.medications.length?d.medications.map(m=>`  • ${m.name}${m.dosage?" "+m.dosage:""}`):["  Nenhum"]),
   "",
   `💉 VACINAS COM ALERTA (${d.vaccAlert.length}):`,
   ...(d.vaccAlert.length?d.vaccAlert.map(v=>`  • ${v.name} — ${new Date(v.next_dose_at).toLocaleDateString("pt-BR")}`):["  Todas em dia"]),
   "",
   `🏥 ÚLTIMA CONSULTA:`,
   d.lastConsult?`  ${new Date(d.lastConsult.consult_date).toLocaleDateString("pt-BR")} — ${d.lastConsult.diagnosis||d.lastConsult.symptoms||"Consulta geral"}`:"  Não registrada",
   "",
   `🏥 CIRURGIAS: ${d.surgeries.length?d.surgeries.map(s=>s.diagnosis).join(", "):"Nenhuma"}`,
   "",
   "Gerado pelo PetHub • pethub-beta.vercel.app"
  ];
  return lines.join("\n");
 }

 if(!data)return(<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:C.beigeLight}}><div style={{width:32,height:32,border:`3px solid ${C.beige}`,borderTop:`3px solid ${C.coral}`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/></div>);

   </div>

   <div style={{padding:"16px 20px 100px"}}>
    <div style={{background:`${C.green}15`,borderRadius:13,padding:"11px 14px",marginBottom:14,display:"flex",gap:9,alignItems:"center"}}>
     <span style={{fontSize:18}}>✅</span>
     <div style={{fontSize:12,color:"#2E7D32",fontWeight:600}}>Resumo gerado automaticamente com base no prontuário de {data?.pet?.name||"seu pet"}.</div>
    </div>

    {/* Pet */}
    <Section icon="🐾" title="DADOS DO PET">
     <div style={{display:"flex",flexWrap:"wrap",gap:12}}>

       <div key={k}><div style={{fontSize:10,color:C.light,fontWeight:600,textTransform:"uppercase"}}>{k}</div><div style={{fontSize:13,fontWeight:700,color:C.dark}}>{v}</div></div>

    {/* Alergias */}

function AddConsultationScreen({onNavigate,t}){
 const clinics=["Clínica PetVida","Hospital Vet. USP","AniVet Hospital","VetCare","PetMed Paulista","Hospital Animal SP","Outros"];
 const [date,setDate]=useState(new Date().toISOString().split("T")[0]);
 const [vet,setVet]=useState("");
 const [clinic,setClinic]=useState("");
 const [symptoms,setSymptoms]=useState("");
 const [diagnosis,setDiagnosis]=useState("");
 const [meds,setMeds]=useState([]);
 const [newMed,setNewMed]=useState({name:"",dosage:"",freq:8,days:7,time:"08:00"});
 const [showMedForm,setShowMedForm]=useState(false);
 const [saving,setSaving]=useState(false);
 const [saved,setSaved]=useState(false);

 function addMed(){
  if(!newMed.name.trim())return;
  setMeds(prev=>[...prev,{...newMed,id:Date.now()}]);
  setNewMed({name:"",dosage:"",freq:8,days:7,time:"08:00"});
  setShowMedForm(false);
 }
 function removeMed(id){setMeds(prev=>prev.filter(m=>m.id!==id));}

 async function save(){
  setSaving(true);
  try{
   const {data:{user}}=await sb.auth.getUser();
   if(!user)return;
   const {data:pets}=await sb.from("pets").select("id").eq("user_id",user.id).order("created_at",{ascending:false}).limit(1);
   if(!pets||!pets[0])return;
   const petId=pets[0].id;

   
   const {data:rec}=await sb.from("medical_records").insert({
    pet_id:petId, user_id:user.id,
    consult_date:date, vet_name:vet||null,
    clinic:clinic||null, symptoms:symptoms||null,
    diagnosis:diagnosis||null
   }).select().single();

   
   if(rec&&meds.length){
    for(const m of meds){
     const endDate=new Date(date);
     endDate.setDate(endDate.getDate()+(m.days||7));
     await sb.from("medications").insert({
      pet_id:petId, user_id:user.id,
      medical_record_id:rec.id,
      name:m.name, dosage:m.dosage||null,
      frequency_hours:m.freq||8,
      duration_days:m.days||7,
      start_date:date,
      end_date:endDate.toISOString().split("T")[0],
      schedule_time:m.time||"08:00",
      active:true
     });
     
     await sb.from("routine_tasks").insert({
      pet_id:petId, user_id:user.id,
      title:`💊 ${m.name}${m.dosage?" — "+m.dosage:""}`,
      category:"medicamento",
      frequency:m.freq<=8?"diaria":"diaria",
      scheduled_time:m.time||"08:00",
      active:true
     });
    }
   }
   setSaved(true);
  }catch(e){console.warn("save consult:",e);}
  setSaving(false);
 }

 if(saved)return(
  <div style={{position:"absolute",inset:0,background:C.beigeLight,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 32px"}}>
   <div style={{width:76,height:76,borderRadius:"50%",background:`${C.green}15`,border:`3px solid ${C.green}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:34,marginBottom:18}}>✅</div>
   <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:C.dark,textAlign:"center",marginBottom:10}}>Consulta registrada!</div>
   <div style={{fontSize:13,color:C.light,textAlign:"center",lineHeight:1.6,marginBottom:8}}>Prontuário atualizado.</div>
   {meds.length>0&&<div style={{background:`${C.coral}10`,border:`1.5px solid ${C.coral}30`,borderRadius:13,padding:"12px 16px",width:"100%",marginBottom:20}}>
    <div style={{fontSize:12,fontWeight:800,color:C.coral,marginBottom:8}}>🔔 {meds.length} lembrete{meds.length>1?"s":""} de medicamento criado{meds.length>1?"s":""}!</div>
    {meds.map((m,i)=><div key={i} style={{fontSize:12,color:C.mid,fontWeight:600,marginBottom:3}}>• {m.name} — {m.time} · a cada {m.freq}h · por {m.days} dias</div>)}
   </div>}
   <button onClick={()=>onNavigate("health")} style={{width:"100%",padding:"15px",background:C.coral,color:C.white,borderRadius:17,fontSize:15,fontWeight:800,border:"none",cursor:"pointer",fontFamily:"inherit"}}>Voltar ao Prontuário</button>
  </div>
 );

 const Section=({title,children})=>(
  <div style={{background:C.white,borderRadius:16,padding:"16px",marginBottom:14,boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
   <div style={{fontSize:11,fontWeight:800,color:C.mid,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>{title}</div>
   {children}
  </div>
 );
 const Field=({label,children})=>(
  <div style={{marginBottom:13}}>
   <div style={{fontSize:11,fontWeight:700,color:C.light,marginBottom:6}}>{label}</div>
   {children}

 );
 const Input=({value,onChange,placeholder,type="text"})=>(

    style={{width:"100%",fontSize:13,color:C.dark,background:"transparent",border:"none",outline:"none",fontFamily:"inherit"}}/>
  </div>
 );
 const freqOpts=[[3,"3h"],[4,"4h"],[6,"6h"],[8,"8h"],[12,"12h"],[24,"24h (1x/dia)"]];

 return(

   <StatusBar/>
   <div style={{padding:"0 20px 80px"}}>
    <SubHeader title="📋 Registrar Consulta" onBack={()=>onNavigate("health")}/>

function PetHubApp(){
 const [screen,setScreen]=useState("loading");
 const [activeNav,setActiveNav]=useState("home");
 const [provider,setProvider]=useState(null);
 const [language,setLanguage]=useState("pt");
 const [authMode,setAuthMode]=useState("signup");
 const t=i18n[language];

 useEffect(()=>{
  sb.auth.getSession().then(({data:{session}})=>{
   if(session){setScreen("home");}else{setScreen("welcome");}
  });
  const{data:{subscription}}=sb.auth.onAuthStateChange((_event,session)=>{
   if(!session)setScreen("welcome");
  });
  return()=>subscription.unsubscribe();
 },[]);

 function nav(id,data={}){
  setScreen(id);
  if(["home","health","services","shopping","ong","profile"].includes(id))setActiveNav(id);
  if(data?.provider)setProvider(data.provider);
 }
 function setLang(l){setLanguage(l);}
 const props={onNavigate:nav,activeNav,t,lang:language,setLang,provider};
 const showLogo=!["welcome","onboarding"].includes(screen);
 const lightLogo=["blood","blooddonation","servicedetail","gps"].includes(screen);
 return(<div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px"}}>
  <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}`}</style>
  <div style={{width:390,height:844,borderRadius:44,overflow:"hidden",boxShadow:"0 40px 100px rgba(0,0,0,0.6),0 0 0 2px rgba(255,255,255,0.1)",position:"relative",fontFamily:"'Nunito',sans-serif",background:"#FAF6EE"}}>
   {showLogo&&(
    <div onClick={()=>{setScreen("home");setActiveNav("home");}}
     style={{position:"absolute",top:13,left:16,zIndex:999,display:"flex",alignItems:"center",gap:4,fontFamily:"'Playfair Display',serif",fontSize:13,fontWeight:700,color:lightLogo?"rgba(255,255,255,0.85)":C.coral,cursor:"pointer",letterSpacing:0.3}}>
     🐾 <span>PetHub</span>
    </div>
   )}
   {screen==="loading"       &&<LoadingScreen/>}
   {screen==="welcome"       &&<WelcomeScreen onNext={(mode)=>{setAuthMode(mode||'signup');setScreen("auth");}} lang={language} setLang={setLang}/>}
   {screen==="auth"          &&<AuthScreen mode={authMode} onSuccess={(_user,next)=>setScreen(next)} onBack={()=>setScreen("welcome")}/>}}
   {screen==="onboarding"    &&<OnboardingScreen onNext={()=>nav("home")} lang={language}/>}
   {screen==="home"          &&<HomeScreen {...props}/>}
   {screen==="health"        &&<HealthScreen {...props}/>}
   {screen==="services"      &&<ServicesScreen {...props} setProvider={p=>{setProvider(p);}}/>}
   {screen==="blood"         &&<BloodGuideScreen {...props}/>}
   {screen==="blooddonation" &&<BloodDonationScreen {...props}/>}
   {screen==="map"           &&<MapScreen {...props}/>}

function FAQScreen({onNavigate}){
 const [open,setOpen]=useState(null);
 const toggle=i=>setOpen(open===i?null:i);
 const faqs=[
  {cat:"🏥 Saúde",items:[
   {q:"Quando devo levar meu pet ao veterinário?",a:"Além das consultas anuais de rotina, leve ao vet se observar: perda de apetite por mais de 24h, vômitos ou diarreia repetidos, letargia, dificuldade de respirar, feridas que não cicatrizam ou mudanças repentinas de comportamento. Não espere piorar — o PetHub pode ajudar a agendar uma consulta urgente."},
   {q:"Com que frequência devo vacinar meu pet?",a:"Para cães: V10 anualmente, Antirrábica anualmente ou conforme legislação local. Para gatos: V4 anualmente, Leucemia Felina anualmente. Pets jovens (filhotes) precisam de reforços a cada 21-30 dias nas primeiras vacinas. O prontuário do PetHub te notifica automaticamente."},
   {q:"Como identifico se meu pet está com dor?",a:"Animais escondem dor por instinto. Sinais de alerta: recusa de movimentos habituais, gemidos ao ser tocado em alguma área, lamber ou morder uma região específica, postura arqueada, falta de apetite e isolamento. Se notar 2 ou mais sinais, consulte um veterinário."},
  ]},
  {cat:"🍖 Nutrição",items:[
   {q:"Quais alimentos são proibidos para cães?",a:"NUNCA ofereça: uva e passa (insuficiência renal), chocolate e café (toxicidade cardíaca), cebola e alho (anemia), abacate (peroxina tóxica), macadâmia (sistema nervoso), xilitol/adoçante (glicemia), álcool e ossos cozidos (perfuram intestino). A lista completa está no PetBot — pergunte 'O que Thor pode comer?'"},
   {q:"Quantas refeições por dia para um adulto?",a:"Cães adultos: geralmente 2 refeições por dia (manhã e noite) com quantidade conforme o peso e a raça — consulte a embalagem da ração e seu veterinário. Evite deixar ração à vontade para raças como Golden Retriever, que tendem à obesidade."},
   {q:"Meu pet pode comer comida caseira?",a:"Sim, mas com cuidado. Proteínas magras (frango, peixe), arroz, legumes como cenoura e abobrinha são bem-vindos. Evite sal, condimentos, alho e cebola. Comida caseira pode ser nutritiva mas requer equilíbrio — consulte um veterinário nutricionista para formular a dieta correta."},
  ]},
  {cat:"🧠 Comportamento",items:[
   {q:"Meu cachorro está comendo cocô — o que fazer?",a:"Esse comportamento se chama coprofagia e pode ter várias causas: deficiência nutricional, parasitas, tédio, ansiedade ou comportamento aprendido. Primeiro, verifique se o vermífugo está em dia (o do Thor está pendente há 3 semanas!). Enriqueça o ambiente com brinquedos, exercícios e interação. Se persistir, consulte o vet para descartar causas médicas."},
   {q:"Meu pet está com ciúmes do novo bebê/animal — como lidar?",a:"Introduza mudanças gradualmente. Deixe o pet investigar o cheiro da novidade antes do encontro físico. Mantenha a rotina do pet inalterada e reserve tempo de qualidade exclusivo para ele diariamente. Nunca puna comportamentos de ciúme — reforce com atenção os momentos de calma. Adestramento ajuda muito nessa fase."},
   {q:"Como reduzir a ansiedade de separação?",a:"Comece com saídas curtas e aumente gradualmente. Não faça despedidas dramáticas. Deixe roupas com seu cheiro. Use brinquedos de enriquecimento como Kong recheado. Em casos severos, o veterinário pode recomendar tratamento medicamentoso associado a terapia comportamental."},
  ]},
  {cat:"📱 Sobre o App",items:[
   {q:"Como exportar o prontuário do meu pet?",a:"Acesse Saúde → ícone de compartilhar no canto superior direito → Exportar como PDF. O arquivo gerado inclui vacinas, consultas, documentos e o histórico completo do Thor. Ideal para levar ao veterinário ou compartilhar em caso de emergência."},
   {q:"Como cancelar o plano Premium?",a:"Acesse Perfil → Meu Plano → Gerenciar Assinatura → Cancelar. O cancelamento é imediato e você perde os benefícios Premium ao final do período já pago. Não há multa ou fidelidade. Seus dados e prontuário são sempre seus, independente do plano."},
   {q:"O PetHub vende meus dados para terceiros?",a:"Não. O PetHub segue rigorosamente a LGPD (Lei Geral de Proteção de Dados). Seus dados e os do seu pet não são vendidos. Compartilhamos apenas dados anonimizados e agregados com parceiros de pesquisa veterinária, sempre com sua autorização. Você é o titular dos dados do Thor."},
  ]},
 ];
 let idx=0;
 return(<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column"}}>
  <div style={{flex:1,overflowY:"auto"}}>
   <StatusBar/><div style={{padding:"0 24px 0"}}><SubHeader title="❓ Perguntas Frequentes" onBack={()=>onNavigate("profile")}/></div>
   <div style={{padding:"0 24px 32px"}}>
    {faqs.map(section=>(
     <div key={section.cat} style={{marginBottom:22}}>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:C.dark,marginBottom:10}}>{section.cat}</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
       {section.items.map(item=>{
        const i=idx++;
        return(<div key={i} style={{background:C.white,borderRadius:14,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
         <div onClick={()=>toggle(i)} style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
          <div style={{fontSize:13,fontWeight:700,color:C.dark,lineHeight:1.4,paddingRight:10,flex:1}}>{item.q}</div>
          <div style={{color:C.coral,fontSize:14,flexShrink:0,fontWeight:800}}>{open===i?"▲":"▼"}</div>
         </div>
         {open===i&&<div style={{padding:"0 16px 14px",fontSize:13,color:C.mid,fontWeight:500,lineHeight:1.6,borderTop:`1px solid ${C.beige}`}}>{item.a}</div>}
        </div>);
       })}
      </div>
     </div>
    ))}
   </div>
  </div>
 </div>);}

ReactDOM.createRoot(document.getElementById('root')).render(<PetHubApp/>);
</script>
</body>
</html>
